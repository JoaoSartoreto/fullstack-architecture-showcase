version: '3.8'

services:
  # ==========================================
  # SHARED INFRASTRUCTURE
  # ==========================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - poc-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # SERVICE 1: CORE API (NESTJS)
  # ==========================================
  postgres-core:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user_core
      POSTGRES_PASSWORD: password_core
      POSTGRES_DB: core_db
    ports:
      - "5432:5432"
    networks:
      - poc-network

  core-api:
    build:
      context: ./core-api
    ports:
      - "3000:3000"
    volumes:
      - ./core-api:/app
    command: sh -c "npm install && npm run start:dev"
    depends_on:
      - postgres-core
      - rabbitmq
    networks:
      - poc-network

  # ==========================================
  # SERVICE 2: LOG SERVICE (GO)
  # ==========================================
  postgres-log:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user_log
      POSTGRES_PASSWORD: password_log
      POSTGRES_DB: log_db
    ports:
      - "5433:5432"
    networks:
      - poc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_log -d log_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  log-service:
    build:
      context: ./log-service-go
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres-log
      - DB_PORT=5432
      - DB_USER=user_log
      - DB_PASS=password_log
      - DB_NAME=log_db
      - RMQ_HOST=rabbitmq
      - RMQ_PORT=5672
      - RMQ_USER=guest
      - RMQ_PASS=guest
    depends_on:
      postgres-log:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - poc-network

# ==========================================
# VIRTUAL NETWORK
# ==========================================
networks:
  poc-network:
    driver: bridge