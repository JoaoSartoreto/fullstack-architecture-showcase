version: '3.8'

services:
  # ==========================================
  # SHARED INFRASTRUCTURE
  # ==========================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"   # Internal communication port
      - "15672:15672" # Management UI port (access via http://localhost:15672)
    networks:
      - poc-network

  # ==========================================
  # SERVICE 1: CORE API (NESTJS)
  # ==========================================
  postgres-core:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user_core
      POSTGRES_PASSWORD: password_core
      POSTGRES_DB: core_db
    ports:
      - "5432:5432"
    networks:
      - poc-network

  core-api:
    build:
      context: ./core-api
    ports:
      - "3000:3000"
    volumes:
      - ./core-api:/app
    command: sh -c "npm install && npm run start:dev"
    depends_on:
      - postgres-core
      - rabbitmq
    networks:
      - poc-network

  # ==========================================
  # SERVICE 2: LOG SERVICE (GO)
  # ==========================================
  postgres-log:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user_log
      POSTGRES_PASSWORD: password_log
      POSTGRES_DB: log_db
    ports:
      - "5433:5432" # Maps host port 5433 to container port 5432 to avoid conflicts
    networks:
      - poc-network

  log-service:
    build:
      context: ./log-service-go
    ports:
      - "8080:8080"
    depends_on:
      - postgres-log
      - rabbitmq
    networks:
      - poc-network

# ==========================================
# VIRTUAL NETWORK
# ==========================================
networks:
  poc-network:
    driver: bridge